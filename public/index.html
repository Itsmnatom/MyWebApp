<!DOCTYPE html>
<html lang="th" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="referrer" content="no-referrer">
    <meta name="description" content="SpeedManga - Ultra fast manga reader with premium experience.">
    <title>SpeedManga - Premium Experience</title>
    <link rel="icon" type="image/png" href="/favicon.png">

    <!-- Speed & Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="dns-prefetch" href="https://speed-manga.net">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"
        media="print" onload="this.media='all'">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700&family=Outfit:wght@700;900&display=swap"
        rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Kanit', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        primary: '#FF4500',
                        secondary: '#FF8C00',
                        dark: {
                            900: '#050505',
                            800: '#121212',
                            700: '#1E1E1E',
                            600: '#2A2A2A',
                        }
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.5s ease-out forwards',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Base Styling */
        body {
            background-color: #050505;
            color: #F3F4F6;
            margin: 0;
            overflow-x: hidden;
            background-image:
                radial-gradient(circle at 15% 50%, rgba(255, 69, 0, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(255, 140, 0, 0.03) 0%, transparent 50%);
            background-attachment: fixed;
        }

        /* Glassmorphism Utilities — Optimized for FPS */
        .glass {
            background: rgba(18, 18, 18, 0.75);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transform: translateZ(0);
            will-change: transform;
        }

        .glass-card {
            background: rgba(30, 30, 30, 0.45);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            will-change: transform, opacity;
        }

        /* Text Gradients */
        .text-gradient {
            background: linear-gradient(135deg, #FF4500 0%, #FF8C00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            will-change: filter;
        }

        /* Skeleton Loader */
        .skeleton {
            background: linear-gradient(90deg, #1A1A1A 25%, #2A2A2A 50%, #1A1A1A 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 0.75rem;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #050505;
        }

        ::-webkit-scrollbar-thumb {
            background: #FF4500;
            border-radius: 10px;
            border: 2px solid #050505;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #FF8C00;
        }

        /* General Utilities */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            line-clamp: 2;
            overflow: hidden;
        }

        .line-clamp-5 {
            display: -webkit-box;
            -webkit-line-clamp: 5;
            -webkit-box-orient: vertical;
            line-clamp: 5;
            overflow: hidden;
        }

        /* =============================================
           FIX #1 + #2: Reader — fixed scroll container
           + image centering
           ============================================= */
        #reader-view {
            position: fixed !important;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            /* smooth momentum scroll on iOS */
            scroll-behavior: smooth;
        }

        /* FIX #2: Images always centered, full-width on mobile */
        .reader-image-container {
            width: 100%;
            display: block;
        }

        .reader-image-container img {
            display: block;
            margin: 0 auto;
            background-color: #000000;
            cursor: zoom-in;
            /* Mobile default: full width */
            width: 100%;
            max-width: 100%;
            height: auto;
        }

        /* Desktop: constrain to readable width, keep centered */
        @media (min-width: 1025px) {
            .reader-image-container img {
                width: 70vw !important;
                max-width: 900px !important;
                margin: 0 auto !important;
                box-shadow: 0 0 100px rgba(0, 0, 0, 0.9);
            }
        }

        /* Mobile: ensure no side gaps, no extra padding */
        @media (max-width: 1024px) {
            .reader-image-container img {
                width: 100% !important;
                max-width: 100% !important;
                min-width: 100% !important;
                margin: 0 !important;
                padding: 0 !important;
            }
        }

        /* Reader UI Toggle */
        .ui-hidden {
            opacity: 0 !important;
            pointer-events: none !important;
            transform: translateY(-20px);
        }

        #reader-floats.ui-hidden {
            transform: translateY(20px);
        }
    </style>
</head>

    <script src="/app.js"></script>
    <script>
        // =============================================
        // FIX #1: Reader scroll — listen on the reader
        // element itself, NOT window (since it's fixed+
        // overflow-y-auto, scroll events fire on it)
        // =============================================
        const readerView = document.getElementById('reader-view');
        const readerTopbar = document.getElementById('reader-topbar');
        const readerScrollTopBtn = document.getElementById('reader-scroll-top-btn');

        // Scroll-to-top button scrolls the reader container
        readerScrollTopBtn.addEventListener('click', () => {
            readerView.scrollTo({ top: 0, behavior: 'smooth' });
        });

        let lastScrollY = 0;

        readerView.addEventListener('scroll', () => {
            const currentScrollY = readerView.scrollTop;
            const readerFloats = document.getElementById('reader-floats');
            const readerFooter = document.getElementById('reader-footer');

            if (currentScrollY > 100 && currentScrollY > lastScrollY) {
                readerTopbar.classList.add('ui-hidden');
                readerFloats.classList.add('ui-hidden');
                if (readerFooter) readerFooter.classList.add('ui-hidden');
            } else if (currentScrollY < lastScrollY) {
                readerTopbar.classList.remove('ui-hidden');
                readerFloats.classList.remove('ui-hidden');
                if (readerFooter) readerFooter.classList.remove('ui-hidden');
            }
            lastScrollY = currentScrollY;
        }, { passive: true });
    </script>
</body>

</html>
