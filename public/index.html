<!DOCTYPE html>
<html lang="th" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="referrer" content="no-referrer">
    <meta name="description" content="SpeedManga - Ultra fast manga reader with premium experience.">
    <title>SpeedManga - Premium Experience</title>
    <link rel="icon" type="image/png" href="/favicon.png">

    <!-- Speed & Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"
        media="print" onload="this.media='all'">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700&family=Outfit:wght@700;900&display=swap"
        rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Kanit', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        primary: '#FF4500',
                        secondary: '#FF8C00',
                        dark: {
                            900: '#050505',
                            800: '#121212',
                            700: '#1E1E1E',
                            600: '#2A2A2A',
                        }
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.5s ease-out forwards',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #050505;
            color: #F3F4F6;
            margin: 0;
            overflow-x: hidden;
            background-image:
                radial-gradient(circle at 15% 50%, rgba(255, 69, 0, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(255, 140, 0, 0.03) 0%, transparent 50%);
            background-attachment: fixed;
        }

        .glass {
            background: rgba(18, 18, 18, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .glass-card {
            background: rgba(30, 30, 30, 0.45);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .text-gradient {
            background: linear-gradient(135deg, #FF4500 0%, #FF8C00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Skeleton Loader */
        .skeleton {
            background: linear-gradient(90deg, #1A1A1A 25%, #2A2A2A 50%, #1A1A1A 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 0.75rem;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #000;
        }

        ::-webkit-scrollbar-thumb {
            background: #FF4500;
            border-radius: 10px;
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Reader Optimization - ปรับปรุงการจัดวางภาพและเลื่อนหน้า */
        #reader-view {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #000;
            z-index: 100;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        .reader-image-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #000;
        }

        .reader-image-container img {
            width: 100% !important;
            height: auto !important;
            display: block;
            margin: 0 auto;
            background-color: #000;
            border: none;
            outline: none;
        }

        @media (min-width: 1025px) {
            .reader-image-container img {
                width: 70vw !important;
                max-width: 900px !important;
                box-shadow: 0 0 80px rgba(0, 0, 0, 0.8);
            }
        }

        /* UI Animations */
        .ui-hidden {
            opacity: 0 !important;
            pointer-events: none !important;
            transform: translateY(-20px);
        }

        #reader-floats.ui-hidden {
            transform: translateY(20px);
        }

        .transition-ui {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>

<body class="antialiased selection:bg-primary selection:text-white">

    <!-- NAVIGATION -->
    <nav id="main-header" class="glass sticky top-0 z-50 transition-all duration-300">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <a href="javascript:navigate('/')"
                class="font-display text-2xl md:text-3xl font-black tracking-tighter hover:scale-105 transition-transform duration-300">
                SPEED<span class="text-gradient">MANGA</span>
            </a>
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-4 border-r border-white/10 pr-4">
                    <a href="javascript:navigate('/history')"
                        class="text-[10px] md:text-xs font-bold uppercase tracking-widest text-gray-400 hover:text-primary transition-colors">History</a>
                    <a href="javascript:navigate('/bookmarks')"
                        class="text-[10px] md:text-xs font-bold uppercase tracking-widest text-gray-400 hover:text-blue-400 transition-colors">Bookmarks</a>
                </div>
                <div class="bg-dark-800/80 border border-white/5 px-4 py-1.5 rounded-full flex items-center gap-2">
                    <div class="h-2 w-2 rounded-full bg-green-500 animate-pulse"></div>
                    <span class="text-[10px] font-bold text-gray-300 uppercase mt-0.5">V4 STABLE</span>
                </div>
            </div>
        </div>
    </nav>

    <!-- VIEWS -->
    <div id="home-view" class="hidden min-h-screen pb-20 animate-fade-in-up">
        <div id="popular-section" class="pt-8 mb-8 container mx-auto px-4 md:px-6">
            <div class="flex items-center gap-3 mb-6">
                <div class="w-1.5 h-8 bg-primary rounded-full"></div>
                <h2 class="text-2xl font-black uppercase font-display">Trending</h2>
            </div>
            <div id="popular-container" class="flex gap-4 overflow-x-auto hide-scrollbar pb-4 snap-x snap-mandatory">
            </div>
        </div>

        <div class="container mx-auto px-4 md:px-6">
            <div class="flex items-center gap-3 mb-6">
                <div class="w-1.5 h-8 bg-dark-700 rounded-full"></div>
                <h2 class="text-xl font-bold uppercase font-display">Latest Updates</h2>
            </div>
            <div id="updates-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

            <div id="pagination" class="flex justify-center items-center gap-4 mt-12">
                <button id="btn-prev" class="glass px-6 py-3 rounded-xl font-bold hidden">PREV</button>
                <div class="glass-card px-6 py-3 rounded-xl">
                    <span id="page-indicator" class="text-primary font-black font-display">PAGE 1</span>
                </div>
                <button id="btn-next" class="bg-primary px-8 py-3 rounded-xl font-bold">NEXT</button>
            </div>
        </div>
    </div>

    <!-- DETAIL VIEW -->
    <div id="detail-view" class="hidden min-h-screen relative pb-20">
        <div id="detail-bg" class="absolute inset-0 h-[50vh] bg-cover bg-center opacity-10 blur-2xl"></div>
        <div class="container mx-auto px-4 py-8 relative z-10 max-w-6xl">
            <button onclick="window.history.back()"
                class="mb-8 flex items-center gap-2 text-gray-400 hover:text-white transition-colors">
                <i class="fas fa-arrow-left"></i> BACK
            </button>
            <div class="flex flex-col md:flex-row gap-10 animate-fade-in-up">
                <img id="d-image" class="w-56 md:w-72 rounded-2xl shadow-2xl border border-white/10" src="">
                <div class="flex-1">
                    <h1 id="d-title" class="text-3xl md:text-5xl font-black mb-6 font-display text-white"></h1>
                    <div class="glass-card p-6 rounded-2xl mb-6">
                        <p id="d-synopsis" class="text-gray-400 text-sm leading-relaxed"></p>
                    </div>
                    <div id="d-info" class="flex flex-wrap gap-2 text-xs mb-8"></div>
                    <div id="d-quick-actions" class="flex gap-4"></div>
                </div>
            </div>
            <div id="d-chapters" class="mt-12 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3"></div>
        </div>
    </div>

    <!-- HISTORY/BOOKMARKS VIEW -->
    <div id="list-view" class="hidden min-h-screen pt-24 pb-20 container mx-auto px-6">
        <h2 id="list-title" class="text-3xl font-black uppercase mb-8 font-display"></h2>
        <div id="list-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <!-- READER VIEW -->
    <div id="reader-view" class="hidden">
        <!-- Floating Controls -->
        <div class="fixed bottom-6 right-6 flex flex-col gap-4 z-[110] transition-ui" id="reader-floats">
            <button onclick="document.getElementById('reader-view').scrollTo({ top: 0, behavior: 'smooth' })"
                class="w-12 h-12 rounded-full glass text-white flex items-center justify-center">
                <i class="fas fa-arrow-up"></i>
            </button>
            <button id="float-next-btn"
                class="hidden w-14 h-14 rounded-full bg-primary text-white flex items-center justify-center shadow-lg">
                <i class="fas fa-forward-step"></i>
            </button>
        </div>

        <!-- Top Bar -->
        <div class="fixed top-0 inset-x-0 glass pt-4 pb-6 px-6 flex justify-between items-center z-50 transition-ui"
            id="reader-topbar">
            <button onclick="window.history.back()"
                class="px-4 py-2 rounded-full glass hover:bg-white/10 text-xs font-bold uppercase">
                <i class="fas fa-arrow-left mr-2"></i> BACK
            </button>
            <div class="max-w-md hidden md:block">
                <span id="r-title" class="text-xs font-bold text-gray-300 truncate block"></span>
            </div>
            <div class="w-20"></div>
        </div>

        <!-- Images Container -->
        <div id="r-images" class="reader-image-container" onclick="toggleReaderUI()"></div>

        <!-- Footer -->
        <div id="reader-footer" class="p-12 text-center bg-black flex flex-col items-center">
            <div id="reader-nav-bottom" class="flex gap-4 mb-8"></div>
            <button onclick="window.history.back()"
                class="text-gray-500 hover:text-white text-xs font-bold uppercase">Back to Details</button>
        </div>
    </div>

    <script src="/app.js"></script>
</body>

</html>
