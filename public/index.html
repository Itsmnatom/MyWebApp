<!DOCTYPE html>
<html lang="th" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <meta name="description" content="SpeedManga - Ultra fast manga reader with premium experience.">
    <title>SpeedManga - Premium Experience</title>

    <!-- Speed & Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="dns-prefetch" href="https://speed-manga.net">
    
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" media="print" onload="this.media='all'">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700&family=Outfit:wght@700;900&display=swap" rel="stylesheet">

    <script>
        // Service Worker Registration for Instant Load
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').then(reg => {
                    console.log('[SW] Registered successfully');
                }).catch(err => {
                    console.error('[SW] Registration failed:', err);
                });
            });
        }
    </script>
</head>

<body class="antialiased selection:bg-primary selection:text-white">

    <!-- ============================================
         NAVIGATION (Glassmorphism)
    ============================================ -->
    <nav id="main-header" class="glass sticky top-0 z-50">
        <div class="container py-4 flex justify-between items-center">
            <a href="javascript:navigate('/')" class="font-display text-2xl md:text-3xl font-black tracking-tighter">
                SPEED<span class="text-gradient">MANGA</span>
            </a>
            <div class="flex items-center gap-3 bg-dark-800 border px-4 py-2 rounded-full">
                <div class="relative flex h-2.5 w-2.5">
                  <span class="animate-ping absolute inset-0 rounded-full bg-green-400 opacity-75"></span>
                  <span class="relative rounded-full h-2.5 w-2.5 bg-green-500"></span>
                </div>
                <span class="text-xs font-bold tracking-widest text-gray-400 uppercase">Engine v5</span>
            </div>
        </div>
    </nav>

    <!-- ============================================
         HOME VIEW
    ============================================ -->
    <div id="home-view" class="hidden pb-20">
        
        <!-- Hero / Popular Section -->
        <div id="popular-section" class="relative py-8 mb-8">
            <div class="absolute inset-0 bg-gradient-to-b opacity-5 pointer-events-none"></div>
            <div class="container relative z-10">
                <div class="flex items-center gap-4 mb-8">
                    <div class="bg-primary rounded-full" style="width:6px; height:32px;"></div>
                    <h2 class="text-2xl md:text-3xl font-black tracking-tight uppercase font-display">
                        Trending <span class="text-gradient">Now</span>
                    </h2>
                </div>
                
                <div id="popular-container" class="flex gap-4 overflow-x-auto hide-scrollbar pb-8 px-2">
                    <!-- Skeletons -->
                    <div class="skeleton rounded-2xl" style="width:200px; height:300px; flex-shrink:0;"></div>
                    <div class="skeleton rounded-2xl" style="width:200px; height:300px; flex-shrink:0;"></div>
                    <div class="skeleton rounded-2xl" style="width:200px; height:300px; flex-shrink:0;"></div>
                </div>
            </div>
        </div>

        <!-- Latest Updates Section -->
        <div class="container">
            <div class="flex items-center gap-4 mb-12">
                <div class="bg-dark-700 rounded-full" style="width:6px; height:32px;"></div>
                <h2 class="text-xl md:text-2xl font-bold tracking-tight uppercase font-display">
                    Latest Releases
                </h2>
            </div>

            <div id="updates-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Updates injected here -->
            </div>

            <!-- Pagination -->
            <div id="pagination" class="flex justify-center items-center gap-6 mt-16">
                <button id="btn-prev" class="glass px-8 py-3 rounded-2xl font-bold hidden flex items-center gap-2">
                    <i class="fas fa-arrow-left"></i> Prev
                </button>
                <div class="glass-card px-8 py-3 rounded-2xl border">
                    <span id="page-indicator" class="text-primary font-black text-xl font-display">PAGE 1</span>
                </div>
                <button id="btn-next" class="bg-primary px-8 py-3 rounded-2xl font-bold flex items-center gap-2">
                    Next <i class="fas fa-arrow-right"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- ============================================
         DETAIL VIEW
    ============================================ -->
    <div id="detail-view" class="hidden pb-20 relative">
        <!-- Dynamic Background -->
        <div id="detail-bg" class="absolute inset-0 bg-cover bg-center opacity-15" style="height:50vh; filter:blur(40px);"></div>
        <div class="absolute inset-0 bg-dark-900 opacity-80" style="height:50vh;"></div>

        <div class="container py-8 relative z-10">
            <button onclick="window.history.back()" class="flex items-center gap-3 text-gray-400 group">
                <div class="w-10 h-10 rounded-full glass flex items-center justify-center">
                    <i class="fas fa-arrow-left"></i>
                </div>
                <span class="font-bold text-sm">BACK</span>
            </button>

            <div class="flex flex-col md:flex-row gap-8 mt-8 animate-fade-in-up">
                <div class="relative" style="width:240px; flex-shrink:0;">
                    <img id="d-image" class="w-full rounded-2xl shadow-2xl border aspect-[2/3]" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
                </div>
                
                <div class="flex-1">
                    <h1 id="d-title" class="text-3xl md:text-5xl font-black mb-4 font-display"></h1>
                    <div class="glass-card p-6 rounded-2xl mb-8">
                        <p id="d-synopsis" class="text-gray-300 text-sm line-clamp-5"></p>
                    </div>
                    <div id="d-info" class="flex flex-wrap gap-2 mb-8"></div>
                    <div id="d-quick-actions" class="flex flex-wrap gap-4"></div>
                </div>
            </div>

            <div class="mt-16 animate-fade-in-up">
                <div class="flex items-center gap-4 mb-8">
                    <h3 class="text-2xl font-bold font-display uppercase">Chapters</h3>
                    <div class="border-white/5" style="flex:1; height:1px; border-bottom:1px solid rgba(255,255,255,0.05);"></div>
                </div>
                <div class="glass-card rounded-3xl p-4">
                    <div id="d-chapters" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3" style="max-height:600px; overflow-y:auto;"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================================
         READER VIEW
    ============================================ -->
    <div id="reader-view" class="hidden fixed inset-0 bg-dark-900 z-50 overflow-y-auto">
        
        <!-- Top Bar -->
        <div class="fixed top-0 inset-x-0 glass flex justify-between items-center px-4 py-3 z-50">
            <button onclick="window.history.back()" class="glass px-4 py-2 rounded-full flex items-center gap-2">
                <i class="fas fa-arrow-left text-xs"></i>
                <span class="text-xs font-bold uppercase">Back</span>
            </button>
            <div id="r-title" class="text-xs font-bold truncate px-4" style="max-width:200px;"></div>
            <div style="width:70px;"></div>
        </div>

        <div id="r-images" class="reader-image-container flex flex-col items-center pt-20"></div>

        <!-- Footer -->
        <div class="p-8 text-center flex flex-col items-center">
            <div id="reader-nav-bottom" class="flex justify-center flex-wrap gap-4 mb-12"></div>
            <button onclick="window.history.back()" class="text-gray-500 font-bold uppercase text-xs">Return to Menu</button>
        </div>
    </div>

    <!-- ============================================
         APP SCRIPT
    ============================================ -->
    <script src="app.js"></script>
    <script>
        // Reader scroll hide/show UI logic
        const readerView = document.getElementById('reader-view');
        const mainHeader = document.getElementById('main-header');
        let lastScrollY = 0;
        
        readerView.addEventListener('scroll', () => {
            const currentScrollY = readerView.scrollTop;
            if (currentScrollY > 100 && currentScrollY > lastScrollY) {
                mainHeader.style.transform = 'translateY(-100%)';
            } else {
                mainHeader.style.transform = 'translateY(0)';
            }
            lastScrollY = currentScrollY;
        }, { passive: true });
    </script>
</body>
</html>
