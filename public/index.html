<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>SpeedManga - Full Experience Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;900&display=swap"
        rel="stylesheet">
    <style>
        /* ============================================
           Base & Layout
        ============================================ */
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: #0a0a0a;
            color: #e5e5e5;
            margin: 0;
        }

        /* ============================================
           Skeleton Loader
        ============================================ */
        .skeleton {
            background: linear-gradient(90deg, #1a1a1a 25%, #252525 50%, #1a1a1a 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 0.5rem;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        /* ============================================
           Scrollbar
        ============================================ */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }

        ::-webkit-scrollbar-thumb {
            background: #ff6b00;
            border-radius: 10px;
        }

        /* ============================================
           Reader
        ============================================ */
        .reader-image-container img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
            background-color: #111;
            min-height: 300px;
        }

        /* ============================================
           Float Action Buttons
        ============================================ */
        .btn-float {
            width: 45px;
            height: 45px;
            background-color: #ff6b00;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        .btn-float:hover {
            transform: scale(1.1);
            background-color: #e66000;
        }

        /* ============================================
           Badges
        ============================================ */
        .badge-manhwa {
            background: linear-gradient(135deg, #FF416C 0%, #FF4B2B 100%);
        }

        /* ============================================
           Utility
        ============================================ */
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .line-clamp-6 {
            display: -webkit-box;
            -webkit-line-clamp: 6;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>

<body>

    <!-- ============================================
         NAVIGATION
    ============================================ -->
    <nav id="main-header" class="bg-[#ff6b00] p-4 shadow-xl sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <a href="javascript:navigate('/')" class="text-2xl md:text-3xl font-black text-white italic">
                Speed<span class="text-black">Manga</span>
            </a>
            <div id="status-dot"
                class="flex items-center gap-2 text-[10px] font-bold text-white bg-black/20 px-3 py-1 rounded-full uppercase">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                Full Engine Active
            </div>
        </div>
    </nav>

    <!-- ============================================
         HOME VIEW
    ============================================ -->
    <div id="home-view" class="hidden container mx-auto px-4 py-8">

        <!-- Popular Section (หน้า 1 เท่านั้น) -->
        <div id="popular-section">
            <h2 class="text-xl font-bold mb-6 border-l-4 border-orange-500 pl-3 uppercase">
                มังงะยอดนิยมประจำวัน
            </h2>
            <div id="popular-container" class="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-7 gap-4 mb-12">
                <div class="skeleton h-64"></div>
                <div class="skeleton h-64"></div>
                <div class="skeleton h-64"></div>
                <div class="skeleton h-64"></div>
            </div>
        </div>

        <!-- Updates -->
        <div class="flex flex-col lg:flex-row gap-8">
            <div class="flex-1">
                <h2 class="text-xl font-bold mb-6 border-l-4 border-orange-500 pl-3 uppercase">
                    อัปเดตทั้งหมด (เรียง Manhwa ขึ้นก่อน)
                </h2>
                <div id="updates-container" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-4"></div>

                <!-- Pagination -->
                <div id="pagination" class="flex justify-center items-center gap-4 mt-12 mb-8">
                    <button id="btn-prev"
                        class="bg-gray-800 hover:bg-orange-600 px-6 py-3 rounded-full font-bold transition hidden shadow-lg">
                        <i class="fas fa-chevron-left mr-2"></i>หน้าก่อนหน้า
                    </button>
                    <span id="page-indicator"
                        class="text-orange-500 font-black text-xl px-4 py-2 bg-orange-600/10 rounded-xl">
                        หน้า 1
                    </span>
                    <button id="btn-next"
                        class="bg-gray-800 hover:bg-orange-600 px-6 py-3 rounded-full font-bold transition shadow-lg">
                        หน้าถัดไป <i class="fas fa-chevron-right ml-2"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================================
         DETAIL VIEW
    ============================================ -->
    <div id="detail-view" class="hidden container mx-auto px-4 py-8 max-w-5xl">
        <button onclick="window.history.back()" class="mb-6 text-orange-500 font-bold hover:underline">
            <i class="fas fa-arrow-left mr-2"></i>กลับ
        </button>

        <div id="detail-card" class="bg-[#151515] rounded-3xl p-6 md:p-10 border border-gray-800 shadow-2xl">
            <div class="flex flex-col md:flex-row gap-10">
                <img id="d-image"
                    class="w-full md:w-72 rounded-2xl shadow-2xl border border-gray-700 bg-gray-900 object-cover aspect-[2/3]">
                <div class="flex-1">
                    <h1 id="d-title" class="text-2xl md:text-3xl font-black mb-4 text-orange-500 leading-tight"></h1>
                    <p id="d-synopsis" class="text-gray-400 text-sm mb-8 leading-relaxed line-clamp-6"></p>
                    <div id="d-info" class="grid grid-cols-2 gap-4 text-xs"></div>
                </div>
            </div>

            <div class="mt-12">
                <h3 class="text-xl font-bold mb-6 border-b border-gray-800 pb-3">รายการตอน</h3>
                <div id="d-chapters" class="grid grid-cols-1 md:grid-cols-2 gap-3 max-h-[500px] overflow-y-auto pr-4">
                </div>
            </div>
        </div>
    </div>

    <!-- ============================================
         READER VIEW
    ============================================ -->
    <div id="reader-view" class="hidden fixed inset-0 bg-black z-[100] overflow-y-auto">

        <!-- Float Buttons -->
        <div class="fixed bottom-6 right-6 flex flex-col gap-3 z-[110]">
            <div onclick="document.getElementById('reader-view').scrollTo({ top: 0, behavior: 'smooth' })"
                class="btn-float" title="ขึ้นบนสุด">
                <i class="fas fa-chevron-up"></i>
            </div>
            <div id="float-next-btn" class="btn-float hidden" title="ตอนถัดไป">
                <i class="fas fa-chevron-down text-lg"></i>
            </div>
        </div>

        <!-- Reader Top Bar -->
        <div
            class="bg-[#1a1a1a]/95 backdrop-blur sticky top-0 p-4 flex justify-between items-center border-b border-gray-800 z-10">
            <button onclick="window.history.back()" class="text-white font-bold hover:text-orange-500">
                <i class="fas fa-chevron-left mr-2"></i>กลับ
            </button>
            <div id="r-title" class="text-[10px] md:text-xs font-bold text-orange-500 truncate px-4"></div>
            <div class="w-8"></div>
        </div>

        <!-- Images -->
        <div id="r-images" class="flex flex-col items-center min-h-screen reader-image-container"></div>

        <!-- Reader Bottom Nav -->
        <div class="p-10 text-center bg-[#111] border-t border-gray-800">
            <div id="reader-nav-bottom" class="flex justify-center gap-4 mb-6"></div>
            <button onclick="window.history.back()"
                class="bg-gray-800 px-10 py-3 rounded-full font-bold hover:bg-gray-700 transition">
                กลับหน้ารายละเอียด
            </button>
        </div>
    </div>

    <!-- ============================================
         APP SCRIPT
    ============================================ -->
    <script src="app.js"></script>
</body>

</html>
